<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon | Jump Resonance</title>
    <style>
        :root {
            --bg-dark: #070b14;
            --panel-bg: #111827;
            --accent: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #64748b;
            --ui-border: rgba(255,255,255,0.1);
            --correct: #10b981;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* --- CONFIGURATION SCREEN (Branded) --- */
        #config-screen {
            display: flex; width: 100%; height: 100%;
            background: radial-gradient(circle at bottom left, #1e1b4b, var(--bg-dark) 80%);
        }

        .brand-section {
            flex: 1.2; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
        }

        .brand-title {
            font-size: 3.5rem; font-weight: 200; letter-spacing: 15px;
            text-transform: uppercase; margin: 0;
            background: linear-gradient(to bottom, #fff 40%, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .config-right {
            flex: 1; padding: 40px 60px; display: flex; flex-direction: column;
            justify-content: center; background: rgba(17, 24, 39, 0.8);
            border-left: 1px solid var(--ui-border); backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        h2 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 25px; }

        .setting-group {
            margin-bottom: 18px; border-bottom: 1px solid var(--ui-border);
            padding-bottom: 8px; display: flex; flex-direction: column;
        }

        .setting-group label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

        .input-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .input-row input, .input-row select {
            background: transparent; border: none; color: var(--text-main);
            font-size: 1.1rem; width: 120px; outline: none; font-family: monospace;
        }
        
        select option { background: var(--panel-bg); color: white; }
        input[type="color"] { background: none; border: none; width: 30px; height: 30px; cursor: pointer; }

        .btn-start {
            margin-top: 25px; padding: 18px; font-size: 0.9rem; font-weight: 800;
            background: var(--accent); color: #000; border: none; border-radius: 8px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.2s ease;
        }
        .btn-start:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* --- TUTORIAL (Branded) --- */
        #tutorial-screen {
            display: none; width: 100%; height: 100%; background-color: var(--bg-dark);
            flex-direction: column; align-items: center; justify-content: center;
        }

        .modal {
            max-width: 500px; padding: 50px; background: var(--panel-bg); 
            border: 1px solid var(--ui-border); border-radius: 24px; text-align: center;
        }

        /* --- EXERCISE SCREEN (Clean/Clinical) --- */
        #exercise-screen {
            display: none; width: 100%; height: 100%; 
            background-color: #000000; /* Pure black for therapy */
            flex-direction: column; align-items: center; justify-content: center;
            cursor: none;
        }

        .hud {
            position: absolute; top: 20px; width: 90%; display: flex;
            justify-content: space-between; font-family: monospace; z-index: 10;
            color: #ffffff;
        }

        .canvas-container { position: relative; width: 800px; height: 600px; }
        
        canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            mix-blend-mode: lighten; pointer-events: none;
        }

        /* --- RESULTS (Branded) --- */
        #results-screen {
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1e1b4b, var(--bg-dark));
        }

        #final-score { font-size: 6rem; font-weight: 900; color: var(--correct); margin: 10px 0; }
    </style>
</head>
<body>

    <div id="config-screen">
        <div class="brand-section">
            <h1 class="brand-title">Horizon</h1>
            <p style="letter-spacing: 5px; color: var(--text-dim); font-size: 0.8rem; margin-top: 10px;">JUMP RESONANCE</p>
        </div>
        <div class="config-right">
            <h2>Oscillation Config</h2>
            <div class="setting-group">
                <label>Vergence Mode</label>
                <div class="input-row">
                    <select id="conf-type">
                        <option value="convergence">Convergence (+)</option>
                        <option value="divergence">Divergence (-)</option>
                    </select>
                </div>
            </div>
            <div id="settings-container"></div>
            <div style="display:flex; gap:15px; margin-top: 5px;">
                <div class="setting-group" style="flex:1;"><label>Lens Alpha</label><input type="color" id="conf-redColor" value="#FF0000"></div>
                <div class="setting-group" style="flex:1;"><label>Lens Beta</label><input type="color" id="conf-blueColor" value="#0000FF"></div>
            </div>
            <button class="btn-start" onclick="showTutorial()">Deploy Matrix</button>
        </div>
    </div>

    <div id="tutorial-screen">
        <div class="modal">
            <h2 style="margin-top:0; color: var(--accent);">Clinical Sync Active</h2>
            <p style="color: var(--text-dim); line-height: 1.6;">The interface uses high-contrast clinical rendering. Your cursor is <strong>Depth-Synced</strong> to the active target.</p>
            <button class="btn-start" style="width: 100%;" onclick="startExercise()">Begin Training</button>
        </div>
    </div>

    <div id="exercise-screen">
        <div class="hud">
            <div>TARGET: <span id="hud-target-pd" style="color:#ffcc00;">T1</span></div>
            <div>SCORE: <span id="hud-score">0</span></div>
            <div>TIME: <span id="hud-time">60</span>s</div>
        </div>
        <div class="canvas-container" id="interaction-zone">
            <canvas id="canvasBlue" width="800" height="600"></canvas>
            <canvas id="canvasRed" width="800" height="600"></canvas>
        </div>
    </div>

    <div id="results-screen">
        <h2 style="color: var(--text-main); margin-bottom: 0;">Session Decoupled</h2>
        <div id="final-score">0</div>
        <p style="color: var(--text-dim); margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase;">Total Resonance Points</p>
        <button class="btn-start" onclick="location.reload()" style="width: 200px;">Restart</button>
    </div>

    <script>
        const configKeys = [
            { id: 'distance', label: 'View Distance (cm)', default: 40 },
            { id: 'brightness', label: 'Luminance (%)', default: 100 },
            { id: 'target1PD', label: 'Primary PD (T1)', default: 12 },
            { id: 'target2PD', label: 'Secondary PD (T2)', default: 6 },
            { id: 'time', label: 'Duration (Min)', default: 1 }
        ];

        configKeys.forEach(conf => {
            const group = document.createElement('div');
            group.className = 'setting-group';
            group.innerHTML = `<label>${conf.label}</label><div class="input-row"><input type="number" id="conf-${conf.id}" value="${conf.default}"></div>`;
            document.getElementById('settings-container').appendChild(group);
        });

        let state = { 
            activeTarget: 1, currentLetter: '', score: 0, 
            timeRemaining: 0, gridHitboxes: [], mouseX: 0, mouseY: 0 
        };

        const letters = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O'];

        function hexToRgb(hex, br) {
            const r = Math.round(parseInt(hex.slice(1, 3), 16) * (br/100));
            const g = Math.round(parseInt(hex.slice(3, 5), 16) * (br/100));
            const b = Math.round(parseInt(hex.slice(5, 7), 16) * (br/100));
            return `rgb(${r}, ${g}, ${b})`;
        }

        function showTutorial() {
            document.getElementById('config-screen').style.display = 'none';
            document.getElementById('tutorial-screen').style.display = 'flex';
        }

        function startExercise() {
            document.getElementById('tutorial-screen').style.display = 'none';
            document.getElementById('exercise-screen').style.display = 'flex';
            state.timeRemaining = document.getElementById('conf-time').value * 60;
            
            window.addEventListener('mousemove', (e) => {
                const rect = document.getElementById('interaction-zone').getBoundingClientRect();
                state.mouseX = e.clientX - rect.left;
                state.mouseY = e.clientY - rect.top;
                drawGraphics();
            });

            window.addEventListener('mousedown', handleInteraction);
            
            setInterval(() => {
                state.timeRemaining--;
                document.getElementById('hud-time').innerText = state.timeRemaining;
                if(state.timeRemaining <= 0) endExercise();
            }, 1000);

            generateNextRound();
        }

        function generateNextRound() {
            state.currentLetter = letters[Math.floor(Math.random() * letters.length)];
            const pd = state.activeTarget === 1 ? document.getElementById('conf-target1PD').value : document.getElementById('conf-target2PD').value;
            
            const dist = document.getElementById('conf-distance').value;
            const pixelShift = ((pd * dist) / 100) * 38;
            const type = document.getElementById('conf-type').value;

            const shift = (type === 'convergence') ? pixelShift/2 : -pixelShift/2;
            document.getElementById('canvasBlue').style.transform = `translateX(${shift}px)`;
            document.getElementById('canvasRed').style.transform = `translateX(${-shift}px)`;

            document.getElementById('hud-target-pd').innerText = `T${state.activeTarget} (${pd}PD)`;
            drawGraphics();
        }

        function drawGraphics() {
            const ctxB = document.getElementById('canvasBlue').getContext('2d');
            const ctxR = document.getElementById('canvasRed').getContext('2d');
            const br = document.getElementById('conf-brightness').value;
            const colR = hexToRgb(document.getElementById('conf-redColor').value, br);
            const colB = hexToRgb(document.getElementById('conf-blueColor').value, br);

            ctxB.clearRect(0,0,800,600); ctxR.clearRect(0,0,800,600);

            // Clinical Crosshair Cursor
            function drawCursor(ctx, color) {
                ctx.strokeStyle = color; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(state.mouseX - 12, state.mouseY); ctx.lineTo(state.mouseX + 12, state.mouseY);
                ctx.moveTo(state.mouseX, state.mouseY - 12); ctx.lineTo(state.mouseX, state.mouseY + 12);
                ctx.stroke();
            }
            drawCursor(ctxB, colB); drawCursor(ctxR, colR);

            // Exercise Target
            drawBox(ctxB, state.currentLetter, 400, 100, colB);
            drawBox(ctxR, state.currentLetter, 400, 100, colR);

            // Grid
            state.gridHitboxes = [];
            let i = 0;
            for(let r=0; r<3; r++){
                for(let c=0; c<5; c++){
                    const x = 150 + c*125; const y = 250 + r*100;
                    drawBox(ctxB, letters[i], x, y, colB);
                    drawBox(ctxR, letters[i], x, y, colR);
                    state.gridHitboxes.push({ltr: letters[i], x, y});
                    i++;
                }
            }
        }

        function drawBox(ctx, ltr, x, y, col) {
            ctx.strokeStyle = col; ctx.fillStyle = col; 
            ctx.font = "bold 30px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.strokeRect(x-30, y-30, 60, 60);
            ctx.fillText(ltr, x, y);
        }

        function handleInteraction() {
            for(let box of state.gridHitboxes) {
                if(Math.abs(state.mouseX - box.x) < 30 && Math.abs(state.mouseY - box.y) < 30) {
                    if(box.ltr === state.currentLetter) {
                        state.score++;
                        document.getElementById('hud-score').innerText = state.score;
                        state.activeTarget = state.activeTarget === 1 ? 2 : 1;
                        generateNextRound();
                    }
                    break;
                }
            }
        }

        function endExercise() {
            document.getElementById('exercise-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = state.score;
        }
    </script>
</body>
</html>
