<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon | Convergence Pro</title>
    <style>
        :root {
            --bg-color: #070712;
            --panel-bg: #0f0f1f;
            --text-color: #f8fafc;
            --accent-color: #a855f7; /* Horizon Purple */
            --accent-dim: #6b21a8;
            --border-color: rgba(168, 85, 247, 0.2);
            --correct: #10b981;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* --- CONFIGURATION --- */
        #config-screen {
            display: flex; width: 100%; height: 100%;
            background: radial-gradient(circle at left bottom, #1e1b4b, #000000 70%);
        }

        .config-left { flex: 1; display: flex; align-items: center; justify-content: center; }
        
        .brand-title {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: 15px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 30%, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .config-right {
            flex: 1; padding: 40px 60px; display: flex; flex-direction: column;
            justify-content: center; background: rgba(10, 10, 20, 0.9);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
        }

        h2 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-color); margin-bottom: 30px; }

        .setting-group {
            margin-bottom: 15px; border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px; display: flex; flex-direction: column;
        }

        .setting-group label { font-size: 0.7rem; font-weight: 800; margin-bottom: 4px; color: #94a3b8; text-transform: uppercase; }

        .input-row { display: flex; justify-content: space-between; align-items: center; }
        .input-row input[type="number"] {
            background: transparent; border: none; color: white;
            font-size: 1.1rem; width: 80px; outline: none; font-family: monospace;
        }

        .controls button {
            background: #1e1b4b; color: white; border: 1px solid var(--accent-dim);
            width: 32px; height: 32px; cursor: pointer; border-radius: 4px;
            transition: 0.2s;
        }
        .controls button:hover { background: var(--accent-dim); }

        .btn-start {
            margin-top: 25px; padding: 18px; font-size: 1rem; font-weight: bold;
            background: var(--accent-color); color: white; border: none; border-radius: 8px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-start:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 10px 20px -5px var(--accent-dim); }

        /* --- EXERCISE --- */
        #exercise-screen {
            display: none; width: 100%; height: 100%; background-color: black;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .hud {
            position: absolute; top: 20px; width: 90%; display: flex;
            justify-content: space-between; font-size: 1.2rem; font-family: monospace; z-index: 10;
            color: var(--accent-color);
        }

        .canvas-container { position: relative; width: 850px; height: 600px; }
        
        canvas { 
            position: absolute; top: 0; left: 125px; 
            width: 600px; height: 600px; 
            image-rendering: pixelated; 
            mix-blend-mode: lighten;
        }

        /* --- RESULTS --- */
        #results-screen {
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #2e1065, #000000);
        }
        .score-display { font-size: 6rem; font-weight: 900; color: var(--accent-color); margin: 10px; }
        .result-detail { font-size: 1.1rem; color: #94a3b8; margin: 5px; font-family: monospace; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="config-screen">
        <div class="config-left"><h1 class="brand-title">Horizon</h1></div>
        <div class="config-right">
            <h2>Convergence Tuner</h2>
            <div id="settings-container"></div>
            
            <div style="display:flex; gap: 15px; margin-top: 5px;">
                <div class="setting-group" style="flex: 1;">
                    <label>Filter A (Left)</label>
                    <input type="color" id="conf-redColor" value="#FF0000" style="width:100%; height:35px; background:none; border:2px solid var(--border-color); border-radius:4px; cursor:pointer;">
                </div>
                <div class="setting-group" style="flex: 1;">
                    <label>Filter B (Right)</label>
                    <input type="color" id="conf-blueColor" value="#0000FF" style="width:100%; height:35px; background:none; border:2px solid var(--border-color); border-radius:4px; cursor:pointer;">
                </div>
            </div>

            <button class="btn-start" onclick="startExercise()">Initialize Session</button>
        </div>
    </div>

    <div id="exercise-screen">
        <div class="hud">
            <div>TRIAL: <span id="hud-trial">1/10</span></div>
            <div>VERGENCE: <span id="hud-dioptre">2</span> PD</div>
            <div>TIME: <span id="hud-time">10</span>s</div>
        </div>
        <div class="canvas-container">
            <canvas id="canvasBlue" width="600" height="600"></canvas>
            <canvas id="canvasRed" width="600" height="600"></canvas>
        </div>
    </div>

    <div id="results-screen">
        <h1 class="brand-title" style="font-size: 1.5rem; letter-spacing: 8px;">Analysis Complete</h1>
        <div class="score-display"><span id="final-percent">0</span>%</div>
        <div class="result-detail">Accuracy: <span id="final-fraction">0/0</span></div>
        <div class="result-detail">Peak Convergence: <span id="final-peak">0</span> PD</div>
        <button class="btn-start" style="min-width: 200px;" onclick="location.reload()">Reset Horizon</button>
    </div>

    <script>
        const configKeys = [
            { id: 'distance', label: 'Test Distance (cm)', default: 40, step: 5, min: 10 },
            { id: 'maxDioptre', label: 'Max Convergence (PD)', default: 50, step: 1, min: 1 },
            { id: 'movement', label: 'Step Magnitude (PD)', default: 2, step: 1, min: 1 },
            { id: 'reps', label: 'Session Repetitions', default: 10, step: 1, min: 1 },
            { id: 'respTime', label: 'Response Window (sec)', default: 15, step: 1, min: 2 },
            { id: 'interval', label: 'Rest Interval (sec)', default: 1, step: 1, min: 0 },
            { id: 'brightness', label: 'Dot Intensity (%)', default: 100, step: 5, min: 5 },
            { id: 'squareSize', label: 'Target Object Size (px)', default: 150, step: 10, min: 40 }
        ];

        configKeys.forEach(conf => {
            const group = document.createElement('div');
            group.className = 'setting-group';
            group.innerHTML = `
                <label>${conf.label}</label>
                <div class="input-row">
                    <input type="number" id="conf-${conf.id}" value="${conf.default}">
                    <div class="controls">
                        <button onclick="adjustSetting('${conf.id}', ${conf.step})">+</button>
                        <button onclick="adjustSetting('${conf.id}', -${conf.step})">-</button>
                    </div>
                </div>`;
            document.getElementById('settings-container').appendChild(group);
        });

        function adjustSetting(id, amt) {
            const el = document.getElementById(`conf-${id}`);
            el.value = Math.max(configKeys.find(k => k.id === id).min, parseInt(el.value) + amt);
        }

        let state = { trial: 0, score: 0, dioptre: 2, peakCorrect: 0, expected: '', timer: null, active: false };

        function hexToRgb(hex, br) {
            const ratio = br / 100;
            const r = Math.round(parseInt(hex.slice(1, 3), 16) * ratio);
            const g = Math.round(parseInt(hex.slice(3, 5), 16) * ratio);
            const b = Math.round(parseInt(hex.slice(5, 7), 16) * ratio);
            return [r, g, b];
        }

        function startExercise() {
            document.getElementById('config-screen').style.display = 'none';
            document.getElementById('exercise-screen').style.display = 'flex';
            window.addEventListener('keydown', handleInput);
            nextTrial();
        }

        function nextTrial() {
            const reps = parseInt(document.getElementById('conf-reps').value);
            if(state.trial >= reps) { showResults(); return; }
            state.trial++;
            document.getElementById('hud-trial').innerText = `${state.trial}/${reps}`;
            document.getElementById('hud-dioptre').innerText = state.dioptre;
            
            const ctxR = document.getElementById('canvasRed').getContext('2d');
            const ctxB = document.getElementById('canvasBlue').getContext('2d');
            ctxR.clearRect(0,0,600,600); ctxB.clearRect(0,0,600,600);

            setTimeout(drawRDS, parseInt(document.getElementById('conf-interval').value) * 1000);
        }

        function drawRDS() {
            const dist = parseInt(document.getElementById('conf-distance').value);
            const pixelShift = ((state.dioptre * dist) / 100) * 38;

            const cB = document.getElementById('canvasBlue');
            const cR = document.getElementById('canvasRed');
            
            cB.style.transform = `translateX(${pixelShift/2}px)`;
            cR.style.transform = `translateX(-${pixelShift/2}px)`;

            state.expected = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'][Math.floor(Math.random() * 4)];

            renderEngine(cB.getContext('2d'), cR.getContext('2d'), state.expected, state.dioptre);
            state.active = true;
            runTimer();
        }

        function renderEngine(ctxB, ctxR, pos, dioptre) {
            const size = 600, dot = 4, grid = size/dot;
            const pattern = new Uint8Array(grid * grid).map(() => Math.random() > 0.5 ? 1 : 0);
            const sqGridSize = Math.floor(parseInt(document.getElementById('conf-squareSize').value) / dot);
            
            const br = parseInt(document.getElementById('conf-brightness').value);
            const colR = hexToRgb(document.getElementById('conf-redColor').value, br);
            const colB = hexToRgb(document.getElementById('conf-blueColor').value, br);

            let sx = Math.floor(grid/2 - sqGridSize/2);
            let sy = Math.floor(grid/2 - sqGridSize/2);
            const offset = 25; 

            if(pos === 'ArrowUp') sy -= offset; 
            else if(pos === 'ArrowDown') sy += offset;
            else if(pos === 'ArrowLeft') sx -= offset; 
            else if(pos === 'ArrowRight') sx += offset;

            const imgB = ctxB.createImageData(size, size);
            const imgR = ctxR.createImageData(size, size);

            const useGap = dioptre > 30;
            const gapWidth = useGap ? Math.floor((dioptre - 20) / 2) : 0;

            for(let y=0; y<grid; y++) {
                for(let x=0; x<grid; x++) {
                    const isInside = (x >= sx && x < sx+sqGridSize && y >= sy && y < sy+sqGridSize);
                    const valB = pattern[y * grid + x];
                    const valR = isInside ? pattern[y * grid + ((x + 4) % grid)] : valB;

                    let drawB = valB; let drawR = valR;
                    if(useGap) {
                        if(x > grid - gapWidth) drawB = 0;
                        if(x < gapWidth) drawR = 0;
                    }

                    for(let i=0; i<dot; i++) {
                        for(let j=0; j<dot; j++) {
                            const idx = ((y*dot+i)*size + (x*dot+j)) * 4;
                            if(drawB) { 
                                imgB.data[idx]=colB[0]; imgB.data[idx+1]=colB[1]; imgB.data[idx+2]=colB[2]; imgB.data[idx+3]=255; 
                            }
                            if(drawR) { 
                                imgR.data[idx]=colR[0]; imgR.data[idx+1]=colR[1]; imgR.data[idx+2]=colR[2]; imgR.data[idx+3]=255; 
                            }
                        }
                    }
                }
            }
            ctxB.putImageData(imgB, 0, 0);
            ctxR.putImageData(imgR, 0, 0);
        }

        function runTimer() {
            let t = parseInt(document.getElementById('conf-respTime').value);
            document.getElementById('hud-time').innerText = t;
            clearInterval(state.timer);
            state.timer = setInterval(() => {
                t--; document.getElementById('hud-time').innerText = t;
                if(t <= 0) { clearInterval(state.timer); resolve(false); }
            }, 1000);
        }

        function handleInput(e) {
            if(!state.active) return;
            if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                e.preventDefault();
                clearInterval(state.timer);
                resolve(e.key === state.expected);
            }
        }

        function resolve(correct) {
            state.active = false;
            if(correct) {
                state.score++;
                if (state.dioptre > state.peakCorrect) state.peakCorrect = state.dioptre;
                state.dioptre = Math.min(parseInt(document.getElementById('conf-maxDioptre').value), state.dioptre + parseInt(document.getElementById('conf-movement').value));
            } else {
                state.dioptre = Math.max(2, state.dioptre - parseInt(document.getElementById('conf-movement').value));
            }
            nextTrial();
        }

        function showResults() {
            document.getElementById('exercise-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'flex';
            const reps = parseInt(document.getElementById('conf-reps').value);
            document.getElementById('final-percent').innerText = Math.round((state.score/reps)*100);
            document.getElementById('final-fraction').innerText = `${state.score} / ${reps}`;
            document.getElementById('final-peak').innerText = state.peakCorrect;
        }
    </script>
</body>
</html>
